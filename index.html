<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revenue Instruments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%235DADE2'/><text x='50%25' y='55%25' font-family='system-ui' font-size='18' font-weight='800' fill='white' text-anchor='middle' dominant-baseline='middle'>R</text></svg>" />
    <style>
      @keyframes shimmer {
        0%   { transform: translateX(-100%) scaleX(0.5); }
        50%  { transform: translateX(60%)   scaleX(1); }
        100% { transform: translateX(250%)  scaleX(0.5); }
      }
      @keyframes stepIn {
        from { opacity: 0; transform: translateX(16px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes stepBack {
        from { opacity: 0; transform: translateX(-16px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes ripple {
        0%   { transform: scale(1);   opacity: 0.8; }
        100% { transform: scale(1.6); opacity: 0; }
      }
      @keyframes cardRise {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
