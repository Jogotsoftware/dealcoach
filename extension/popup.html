<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 400px; min-height: 200px; max-height: 600px; overflow-y: auto;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1419; color: #e8eaed; font-size: 13px;
}
.header { background: #1a1f2e; padding: 10px 16px; border-bottom: 1px solid #2a3040; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 15px; font-weight: 800; color: #5DADE2; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-green { background: rgba(46,204,113,0.15); color: #2ecc71; }
.badge-red { background: rgba(231,76,60,0.15); color: #e74c3c; }
.badge-gray { background: rgba(136,153,170,0.15); color: #8899aa; }
.content { padding: 14px 16px; }
.source-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #232838; border-radius: 6px; margin-bottom: 14px; font-size: 11px; color: #8899aa; }
.source-bar .icon { font-size: 14px; }
.source-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
.source-salesforce { background: rgba(0,112,210,0.2); color: #0070d2; }
.source-linkedin { background: rgba(10,102,194,0.2); color: #0a66c2; }
.source-generic { background: rgba(93,173,226,0.15); color: #5DADE2; }
.field { margin-bottom: 10px; }
.field label { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: #8899aa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.field .auto-tag { font-size: 8px; background: rgba(46,204,113,0.2); color: #2ecc71; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.field input, .field select, .field textarea { width: 100%; background: #1a1f2e; border: 1px solid #2a3040; border-radius: 5px; padding: 7px 10px; color: #e8eaed; font-size: 13px; font-family: inherit; outline: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #5DADE2; }
.field textarea { resize: vertical; min-height: 50px; }
.field select { cursor: pointer; }
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; }
.divider { border-top: 1px solid #2a3040; margin: 12px 0; }
.section-label { font-size: 10px; font-weight: 700; color: #5DADE2; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; width: 100%; transition: all 0.15s; }
.btn-primary { background: #5DADE2; color: #fff; }
.btn-primary:hover { background: #4a9ad0; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); border-radius: 6px; padding: 14px; text-align: center; margin-bottom: 12px; }
.success .title { color: #2ecc71; font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.success .sub { color: #8899aa; font-size: 11px; }
.success .link { color: #5DADE2; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 8px; display: block; text-decoration: none; }
.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: 6px; padding: 10px; color: #e74c3c; font-size: 12px; margin-bottom: 10px; }
.spinner { width: 14px; height: 14px; border: 2px solid #2a3040; border-top: 2px solid #5DADE2; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.login { padding: 24px 16px; text-align: center; }
.login h2 { font-size: 18px; margin-bottom: 4px; color: #5DADE2; }
.login p { font-size: 12px; color: #8899aa; margin-bottom: 16px; }
.sfdc-fields { background: #232838; border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #8899aa; }
.sfdc-fields .sfdc-row { display: flex; justify-content: space-between; padding: 2px 0; }
.sfdc-fields .sfdc-label { color: #8899aa; }
.sfdc-fields .sfdc-value { color: #e8eaed; font-weight: 600; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <h1>DealCoach</h1>
  <span class="badge badge-gray" id="statusBadge">...</span>
</div>

<div id="loginView" class="login" style="display:block;">
  <h2>Sign In</h2>
  <p>Connect to DealCoach</p>
  <div id="loginError" class="error" style="display:none;"></div>
  <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@company.com"></div>
  <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Password"></div>
  <button class="btn btn-primary" id="loginBtn" style="margin-top:6px;">Sign In</button>
</div>

<div id="formView" class="content" style="display:none;">
  <div class="source-bar" id="sourceBar">
    <span class="icon" id="sourceIcon">&#128269;</span>
    <span id="sourceText">Reading page...</span>
    <span class="source-tag source-generic" id="sourceTag">WEB</span>
  </div>

  <div id="sfdcSummary" class="sfdc-fields" style="display:none;">
    <div style="font-size:10px;font-weight:700;color:#5DADE2;margin-bottom:4px;">SALESFORCE FIELDS DETECTED</div>
    <div id="sfdcFieldsList"></div>
  </div>

  <div id="successMsg" class="success" style="display:none;">
    <div class="title" id="successTitle"></div>
    <div class="sub">AI is researching this company...</div>
    <a class="link" id="openDeal" href="#" target="_blank">Open in DealCoach &rarr;</a>
  </div>
  <div id="errorMsg" class="error" style="display:none;"></div>

  <div id="formFields">
    <div class="section-label">Deal</div>
    <div class="field">
      <label>Company Name * <span class="auto-tag" id="companyTag" style="display:none;">AUTO</span></label>
      <input type="text" id="companyName" placeholder="Company name">
    </div>
    <div class="field">
      <label>Website <span class="auto-tag" id="websiteTag" style="display:none;">AUTO</span></label>
      <input type="url" id="website" placeholder="https://...">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Stage</label>
        <select id="stage">
          <option value="qualify">Qualify</option>
          <option value="discovery">Discovery</option>
          <option value="solution_validation">Solution Validation</option>
          <option value="confirming_value">Confirming Value</option>
          <option value="selection">Selection</option>
        </select>
      </div>
      <div class="field">
        <label>Forecast</label>
        <select id="forecast">
          <option value="pipeline">Pipeline</option>
          <option value="upside">Upside</option>
          <option value="forecast">Forecast</option>
          <option value="commit">Commit</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Deal Value ($) <span class="auto-tag" id="valueTag" style="display:none;">SFDC</span></label>
        <input type="number" id="dealValue" placeholder="0">
      </div>
      <div class="field">
        <label>CMRR ($)</label>
        <input type="number" id="cmrr" placeholder="0">
      </div>
    </div>
    <div class="field">
      <label>Close Date <span class="auto-tag" id="closeTag" style="display:none;">SFDC</span></label>
      <input type="date" id="closeDate">
    </div>

    <div class="divider"></div>
    <div class="section-label">Contact</div>
    <div class="field-row">
      <div class="field">
        <label>Name <span class="auto-tag" id="contactTag" style="display:none;">AUTO</span></label>
        <input type="text" id="contactName" placeholder="Name">
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="contactTitle" placeholder="Title">
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="contactEmail" placeholder="email@company.com">
    </div>

    <div class="divider"></div>
    <div class="field">
      <label>Notes</label>
      <textarea id="notes" placeholder="Notes about this deal..."></textarea>
    </div>

    <button class="btn btn-primary" id="createBtn">Create Deal</button>
    <div style="font-size:10px;color:#8899aa;text-align:center;margin-top:6px;">AI auto-researches after creation</div>
  </div>
</div>

<script src="supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://npfnsyufqqhhjmtvmold.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wZm5zeXVmcXFoaGptdHZtb2xkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4Nzc1NzgsImV4cCI6MjA4OTQ1MzU3OH0.2KpF_ATKJiJP7wEfD74GIOXALhitu7GHavj8CL9OtGU'
const WEB_APP_URL = 'https://dealcoach.netlify.app'
const EDGE_URL = SUPABASE_URL + '/functions/v1'

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
let user = null, profile = null

const d3 = new Date(); d3.setMonth(d3.getMonth() + 3)
document.getElementById('closeDate').value = d3.toISOString().split('T')[0]

async function init() {
  const stored = await chrome.storage.local.get(['dc_access', 'dc_refresh'])
  if (stored.dc_access && stored.dc_refresh) {
    try {
      const { data } = await sb.auth.setSession({ access_token: stored.dc_access, refresh_token: stored.dc_refresh })
      if (data?.session) { user = data.session.user; await loadProfile(); showForm(); readPage(); return }
    } catch {}
  }
  const { data: { session } } = await sb.auth.getSession()
  if (session) { user = session.user; await loadProfile(); showForm(); readPage() }
  else showLogin()
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', user.id).single()
  profile = data || {}
}

function showLogin() {
  document.getElementById('loginView').style.display = 'block'
  document.getElementById('formView').style.display = 'none'
  document.getElementById('statusBadge').textContent = 'Not signed in'
  document.getElementById('statusBadge').className = 'badge badge-red'
}

function showForm() {
  document.getElementById('loginView').style.display = 'none'
  document.getElementById('formView').style.display = 'block'
  document.getElementById('statusBadge').textContent = profile?.initials || 'OK'
  document.getElementById('statusBadge').className = 'badge badge-green'
}

function esc(s) { const el = document.createElement('div'); el.textContent = s; return el.innerHTML }

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value
  const pw = document.getElementById('loginPassword').value
  const err = document.getElementById('loginError')
  const btn = document.getElementById('loginBtn')
  if (!email || !pw) { err.textContent = 'Enter email and password'; err.style.display = 'block'; return }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...'
  err.style.display = 'none'
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw })
  if (error) { err.textContent = error.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; return }
  user = data.session.user
  await chrome.storage.local.set({ dc_access: data.session.access_token, dc_refresh: data.session.refresh_token })
  await loadProfile()
  btn.disabled = false; btn.textContent = 'Sign In'
  showForm(); readPage()
})

document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click() })

function readPage() {
  chrome.tabs.query({ active: true, currentWindow: true }, tabs => {
    if (!tabs[0]?.id) { document.getElementById('sourceText').textContent = 'No tab - fill manually'; return }
    chrome.tabs.sendMessage(tabs[0].id, { type: 'GET_PAGE_DATA' }, resp => {
      if (chrome.runtime.lastError || !resp) {
        document.getElementById('sourceText').textContent = 'Could not read page'
        document.getElementById('sourceTag').style.display = 'none'
        return
      }
      const f = resp.fields || {}, src = resp.source
      document.getElementById('sourceText').textContent = src === 'salesforce' ? 'Salesforce ' + (resp.sourceDetail || '') : src === 'linkedin' ? 'LinkedIn ' + (resp.sourceDetail || '') : resp.sourceDetail || 'Website'
      const tag = document.getElementById('sourceTag')
      tag.textContent = src === 'salesforce' ? 'SFDC' : src === 'linkedin' ? 'LI' : 'WEB'
      tag.className = 'source-tag source-' + src
      document.getElementById('sourceIcon').textContent = src === 'salesforce' ? '\u2601' : src === 'linkedin' ? '\uD83D\uDCBC' : '\uD83C\uDF10'

      if (src === 'salesforce' && Object.keys(f).length > 0) {
        const summary = document.getElementById('sfdcSummary')
        const list = document.getElementById('sfdcFieldsList')
        let html = ''
        for (const [k, v] of Object.entries(f)) {
          if (k === 'relatedContacts' || !v) continue
          html += '<div class="sfdc-row"><span class="sfdc-label">' + esc(k) + '</span><span class="sfdc-value">' + esc(String(v)) + '</span></div>'
        }
        if (html) { list.innerHTML = html; summary.style.display = 'block' }
      }

      function fill(id, val, tagId) {
        if (val) { document.getElementById(id).value = val; if (tagId) document.getElementById(tagId).style.display = 'inline-block' }
      }
      fill('companyName', f.companyName, 'companyTag')
      fill('website', f.website, 'websiteTag')
      fill('dealValue', f.dealValue, 'valueTag')
      fill('closeDate', f.closeDate, 'closeTag')
      fill('contactName', f.contactName, 'contactTag')
      fill('contactTitle', f.contactTitle, null)
      fill('contactEmail', f.contactEmail, null)
      fill('notes', f.description || f.notes, null)
      if (f.stage) { const sel = document.getElementById('stage'); for (const opt of sel.options) { if (opt.value === f.stage) { sel.value = f.stage; break } } }
      if (f.stageOriginal) {
        const n = document.getElementById('notes')
        n.value = (n.value ? n.value + '\n' : '') + 'SFDC Stage: ' + f.stageOriginal
      }
    })
  })
}

document.getElementById('createBtn').addEventListener('click', async () => {
  const companyName = document.getElementById('companyName').value.trim()
  if (!companyName) { document.getElementById('errorMsg').textContent = 'Company name is required'; document.getElementById('errorMsg').style.display = 'block'; return }
  const btn = document.getElementById('createBtn')
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating...'
  document.getElementById('errorMsg').style.display = 'none'

  try {
    const { data: deal, error } = await sb.from('deals').insert({
      rep_id: user.id,
      company_name: companyName,
      website: document.getElementById('website').value.trim() || null,
      stage: document.getElementById('stage').value,
      forecast_category: document.getElementById('forecast').value,
      deal_value: Number(document.getElementById('dealValue').value) || null,
      cmrr: Number(document.getElementById('cmrr').value) || null,
      target_close_date: document.getElementById('closeDate').value || null,
      notes: document.getElementById('notes').value.trim() || null,
    }).select().single()

    if (error) throw error

    const contactName = document.getElementById('contactName').value.trim()
    if (contactName) {
      await sb.from('contacts').insert({
        deal_id: deal.id, name: contactName,
        title: document.getElementById('contactTitle').value.trim() || null,
        email: document.getElementById('contactEmail').value.trim() || null,
        role_in_deal: 'Primary Contact', influence_level: 'Unknown',
      })
    }

    const { data: { session } } = await sb.auth.getSession()
    if (session) {
      fetch(EDGE_URL + '/research-company', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token, 'apikey': SUPABASE_ANON_KEY },
        body: JSON.stringify({ deal_id: deal.id }),
      }).catch(() => {})
    }

    document.getElementById('formFields').style.display = 'none'
    document.getElementById('successMsg').style.display = 'block'
    document.getElementById('successTitle').textContent = companyName + ' created!'
    document.getElementById('openDeal').href = WEB_APP_URL + '/deal/' + deal.id
    btn.disabled = false; btn.textContent = 'Create Deal'
  } catch (err) {
    document.getElementById('errorMsg').textContent = err.message || 'Failed to create deal'
    document.getElementById('errorMsg').style.display = 'block'
    btn.disabled = false; btn.textContent = 'Create Deal'
  }
})

init().catch(err => {
  console.error('Init error:', err)
  document.getElementById('statusBadge').textContent = 'Error'
  document.getElementById('statusBadge').className = 'badge badge-red'
})
</script>
</body>
</html>
