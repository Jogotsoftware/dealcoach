<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 400px; min-height: 200px; max-height: 600px; overflow-y: auto;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1419; color: #e8eaed; font-size: 13px;
}
.header { background: #1a1f2e; padding: 10px 16px; border-bottom: 1px solid #2a3040; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 15px; font-weight: 800; color: #5DADE2; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-green { background: rgba(46,204,113,0.15); color: #2ecc71; }
.badge-red { background: rgba(231,76,60,0.15); color: #e74c3c; }
.badge-gray { background: rgba(136,153,170,0.15); color: #8899aa; }
.content { padding: 14px 16px; }
.source-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #232838; border-radius: 6px; margin-bottom: 14px; font-size: 11px; color: #8899aa; }
.source-bar .icon { font-size: 14px; }
.source-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
.source-salesforce { background: rgba(0,112,210,0.2); color: #0070d2; }
.source-linkedin { background: rgba(10,102,194,0.2); color: #0a66c2; }
.source-generic { background: rgba(93,173,226,0.15); color: #5DADE2; }
.field { margin-bottom: 10px; }
.field label { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: #8899aa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.field .auto-tag { font-size: 8px; background: rgba(46,204,113,0.2); color: #2ecc71; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.field input, .field select, .field textarea { width: 100%; background: #1a1f2e; border: 1px solid #2a3040; border-radius: 5px; padding: 7px 10px; color: #e8eaed; font-size: 13px; font-family: inherit; outline: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #5DADE2; }
.field textarea { resize: vertical; min-height: 50px; }
.field select { cursor: pointer; }
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; }
.divider { border-top: 1px solid #2a3040; margin: 12px 0; }
.section-label { font-size: 10px; font-weight: 700; color: #5DADE2; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; width: 100%; transition: all 0.15s; }
.btn-primary { background: #5DADE2; color: #fff; }
.btn-primary:hover { background: #4a9ad0; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); border-radius: 6px; padding: 14px; text-align: center; margin-bottom: 12px; }
.success .title { color: #2ecc71; font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.success .sub { color: #8899aa; font-size: 11px; }
.success .link { color: #5DADE2; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 8px; display: block; text-decoration: none; }
.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: 6px; padding: 10px; color: #e74c3c; font-size: 12px; margin-bottom: 10px; }
.spinner { width: 14px; height: 14px; border: 2px solid #2a3040; border-top: 2px solid #5DADE2; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.login { padding: 24px 16px; text-align: center; }
.login h2 { font-size: 18px; margin-bottom: 4px; color: #5DADE2; }
.login p { font-size: 12px; color: #8899aa; margin-bottom: 16px; }
.sfdc-fields { background: #232838; border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #8899aa; }
.sfdc-fields .sfdc-row { display: flex; justify-content: space-between; padding: 2px 0; }
.sfdc-fields .sfdc-label { color: #8899aa; }
.sfdc-fields .sfdc-value { color: #e8eaed; font-weight: 600; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <h1>DealCoach</h1>
  <span class="badge badge-gray" id="statusBadge">...</span>
</div>

<div id="loginView" class="login" style="display:block;">
  <h2>Sign In</h2>
  <p>Connect to DealCoach</p>
  <div id="loginError" class="error" style="display:none;"></div>
  <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@company.com"></div>
  <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Password"></div>
  <button class="btn btn-primary" id="loginBtn" style="margin-top:6px;">Sign In</button>
</div>

<div id="formView" class="content" style="display:none;">
  <div class="source-bar" id="sourceBar">
    <span class="icon" id="sourceIcon">&#128269;</span>
    <span id="sourceText">Reading page...</span>
    <span class="source-tag source-generic" id="sourceTag">WEB</span>
  </div>

  <div id="sfdcSummary" class="sfdc-fields" style="display:none;">
    <div style="font-size:10px;font-weight:700;color:#5DADE2;margin-bottom:4px;">SALESFORCE FIELDS DETECTED</div>
    <div id="sfdcFieldsList"></div>
  </div>

  <div id="successMsg" class="success" style="display:none;">
    <div class="title" id="successTitle"></div>
    <div class="sub">AI is researching this company...</div>
    <a class="link" id="openDeal" href="#" target="_blank">Open in DealCoach &rarr;</a>
  </div>
  <div id="errorMsg" class="error" style="display:none;"></div>

  <div id="formFields">
    <div class="section-label">Deal</div>
    <div class="field">
      <label>Company Name * <span class="auto-tag" id="companyTag" style="display:none;">AUTO</span></label>
      <input type="text" id="companyName" placeholder="Company name">
    </div>
    <div class="field">
      <label>Website <span class="auto-tag" id="websiteTag" style="display:none;">AUTO</span></label>
      <input type="url" id="website" placeholder="https://...">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Stage</label>
        <select id="stage">
          <option value="qualify">Qualify</option>
          <option value="discovery">Discovery</option>
          <option value="solution_validation">Solution Validation</option>
          <option value="confirming_value">Confirming Value</option>
          <option value="selection">Selection</option>
        </select>
      </div>
      <div class="field">
        <label>Forecast</label>
        <select id="forecast">
          <option value="pipeline">Pipeline</option>
          <option value="upside">Upside</option>
          <option value="forecast">Forecast</option>
          <option value="commit">Commit</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Deal Value ($) <span class="auto-tag" id="valueTag" style="display:none;">SFDC</span></label>
        <input type="number" id="dealValue" placeholder="0">
      </div>
      <div class="field">
        <label>CMRR ($)</label>
        <input type="number" id="cmrr" placeholder="0">
      </div>
    </div>
    <div class="field">
      <label>Close Date <span class="auto-tag" id="closeTag" style="display:none;">SFDC</span></label>
      <input type="date" id="closeDate">
    </div>

    <div class="divider"></div>
    <div class="section-label">Contact</div>
    <div class="field-row">
      <div class="field">
        <label>Name <span class="auto-tag" id="contactTag" style="display:none;">AUTO</span></label>
        <input type="text" id="contactName" placeholder="Name">
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="contactTitle" placeholder="Title">
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="contactEmail" placeholder="email@company.com">
    </div>

    <div class="divider"></div>
    <div class="field">
      <label>Notes</label>
      <textarea id="notes" placeholder="Notes about this deal..."></textarea>
    </div>

    <button class="btn btn-primary" id="createBtn">Create Deal</button>
    <div style="font-size:10px;color:#8899aa;text-align:center;margin-top:6px;">AI auto-researches after creation</div>
  </div>
</div>

<script src="supabase.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
